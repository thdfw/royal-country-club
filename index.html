<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Royal Country Club</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__overlay" aria-hidden="true"></div>
      <div class="hero__inner">
        <h1 class="hero__title">
          Riding paradise in 
          Brussels.
        </h1>
        <div class="hero__aside">
          <p class="hero__lead">
            The Royal Country Club is an exceptional equestrian club located just
            outside of Brussels.
          </p>
          <div class="hero__actions">
            <a
              class="btn btn--primary"
              href="https://maps.app.goo.gl/N6uE9T91Db1KYwo18?g_st=iw"
              target="_blank"
              rel="noopener noreferrer"
              >Access</a>
            <a
              class="btn btn--secondary"
              href="mailto:admin@countryridingclub.be"
              >Contact us</a>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
